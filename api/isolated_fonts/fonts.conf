<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Only scan the fonts in this directory -->
  <dir>/home/sheshank/Desktop/amafah/mobile-store/backend/isolated_fonts</dir>

  <!-- Store the built cache locally -->
  <cachedir>/home/sheshank/Desktop/amafah/mobile-store/backend/isolated_fonts/isolated_font_cache</cachedir>

  <!-- Disable all standard system font directories to avoid hangs -->
  <selectfont>
    <rejectfont>
      <glob>/usr/share/fonts/*</glob>
    </rejectfont>
    <rejectfont>
      <glob>/usr/local/share/fonts/*</glob>
    </rejectfont>
  </selectfont>
</fontconfig>
