<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Only scan the 3 fonts in this directory. Nothing else. -->
  <dir>/home/sheshank/Desktop/amafah/mobile-store/backend/invoice_fonts</dir>

  <!-- Store the built cache right here so it is always found -->
  <cachedir>/home/sheshank/Desktop/amafah/mobile-store/backend/invoice_fonts/cache</cachedir>

  <!-- Disable all system font directories -->
  <selectfont>
    <rejectfont>
      <glob>/usr/share/fonts/*</glob>
    </rejectfont>
    <rejectfont>
      <glob>/usr/local/share/fonts/*</glob>
    </rejectfont>
  </selectfont>
</fontconfig>
